<html>
<head>
  <meta charset="UTF-8">
  <title>{% block title %}{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/style.css" type="text/css" media="screen" />
  <script type="module">
    import { Dialer } from '/static/dtmf.js';
    window.dialer = new Dialer(0.06, 0.06);
  </script>
  {% block metatags %}{% endblock %}
  {% block scripts %}{% endblock %}
  <style>
    ol {
        font-family: "Bell Gothic";
        font-weight: bold;
    }
    p {
        font-weight: normal;
    }
  </style>
</head>
<body>
  <h1 style="height: 0.4in"><img src="//shady.tel/images/shadytel_logo.svg" class="logo" /> shadytel</h1>
  <div class="body">
    {% if error %}
      <h2 style="clear: left;">Error</h2>
      <p class="error">{{error}}</p>
    {% endif %}
   
    <h2 style="clear: left;">{% block headline %}{% endblock %}</h3>
    
    {% block body %}{% endblock %}
    {% block footer %}{% endblock %}
  </div>
</body>
</html>
